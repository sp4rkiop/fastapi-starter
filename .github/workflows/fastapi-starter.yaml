name: FastAPI Backend CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up environment
        run: |
          test -f .env || cp .env.example .env 2>/dev/null || touch .env

      - name: Run tests
        run: |
          pytest tests/ -v

  build_and_push:
    needs: test
    runs-on: ubuntu-latest
    #remember to do this: https://github.com/docker/build-push-action/issues/606#issuecomment-1117661805

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.actor }}/fastapi-starter:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.actor }}/fastapi-starter:latest
          cache-to: type=inline

      - name: Remove old images
        uses: snok/container-retention-policy@v3.0.1
        with:
          account: user
          token: ${{ secrets.GITHUB_TOKEN }}
          cut-off: 1h
          image-names: "fastapi-starter"
          tag-selection: untagged
